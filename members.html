<style>
:root{
  --bg:#080908;--surface:#0f110f;--surface-2:#171a17;--line:#242824;
  --fg:#fff;--fg-dim:#9aa09a;--fg-faint:#5f655f;
  --green:#00c805;--green-dim:#0a4512;--red:#ff5252;--amber:#ffb020;
  --r:16px;--mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--fg);
  font-family:'Inter',system-ui,-apple-system,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:48px 18px 60px;min-height:100vh}
/* when the explorer is active, allow a wider desktop layout (mobile unchanged) */
@media(min-width:900px){
  body.exploring .wrap{max-width:1200px}
}
.brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
.logo{width:38px;height:38px;border-radius:50%}
.name{font-size:23px;font-weight:800;letter-spacing:-.02em}
.members-badge{font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--green);
  border:1px solid var(--green-dim);border-radius:5px;padding:3px 7px;text-transform:uppercase}
.sub{text-align:center;color:var(--fg-dim);font-size:13.5px;margin:0 0 30px}
.gate{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:26px 22px;animation:rise .3s ease}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.gate-h{font-size:19px;font-weight:800;letter-spacing:-.01em;margin:0 0 6px}
.gate-p{font-size:13.5px;color:var(--fg-dim);line-height:1.6;margin:0 0 20px}
.req{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:11px;margin-bottom:18px}
.req-ico{width:18px;height:18px;color:var(--green);flex:none}
.req-t{font-size:13px}.req-t b{color:var(--fg)}
.btn{width:100%;background:var(--green);color:#000;border:none;border-radius:12px;padding:15px;
  font-weight:800;font-size:15.5px;cursor:pointer;font-family:inherit;letter-spacing:-.01em;
  transition:transform .1s,filter .15s;display:flex;align-items:center;justify-content:center;gap:9px;text-decoration:none}
.btn:hover{filter:brightness(1.07)}.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.7;cursor:default}
.btn-ghost{background:var(--surface-2);color:var(--fg);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--green-dim);filter:none}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.35);border-top-color:#000;border-radius:50%;animation:sp .55s linear infinite}
.btn-ghost .spin{border-color:rgba(255,255,255,.3);border-top-color:#fff}
@keyframes sp{to{transform:rotate(360deg)}}
.disclosure{margin-top:16px;padding:13px 15px;background:linear-gradient(180deg,rgba(0,200,5,.05),rgba(0,200,5,.01));
  border:1px solid rgba(0,200,5,.22);border-radius:12px;display:flex;gap:11px;align-items:flex-start}
.disclosure svg{width:19px;height:19px;color:var(--green);flex:none;margin-top:1px}
.disclosure-t{font-size:11.8px;color:var(--fg-dim);line-height:1.6}
.disclosure-t b{color:var(--fg)}
.status{margin-top:16px;font-size:12.5px;color:var(--fg-faint);text-align:center;min-height:18px;font-family:var(--mono)}
.status.err{color:var(--red)}
.short{margin-top:16px;padding:16px;background:rgba(255,176,32,.06);border:1px solid rgba(255,176,32,.28);border-radius:12px}
.short-h{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:5px}
.short-p{font-size:12.5px;color:var(--fg-dim);line-height:1.55;margin-bottom:12px}
.short-p .mono{font-family:var(--mono);color:var(--fg)}
.member{text-align:center;padding:34px 22px;background:linear-gradient(180deg,rgba(0,200,5,.07),var(--surface));
  border:1px solid rgba(0,200,5,.3);border-radius:var(--r);animation:rise .3s ease}
.member-check{width:52px;height:52px;margin:0 auto 14px;color:var(--green)}
.member-h{font-size:22px;font-weight:900;letter-spacing:-.02em}
.member-addr{font-family:var(--mono);font-size:12px;color:var(--fg-dim);margin-top:6px}
.member-p{font-size:13px;color:var(--fg-dim);margin-top:12px;line-height:1.6}
.member-actions{display:flex;gap:8px;margin-top:20px}
.member-actions .btn{flex:1}
.foot{text-align:center;font-size:11px;color:var(--fg-faint);margin-top:26px;line-height:1.55}
.foot a{color:var(--fg-dim)}

/* ---- explorer shell ---- */
.wrap.wide{max-width:1080px}
.xp{margin-top:4px}
.xp-searchbar{display:flex;gap:8px;margin-bottom:16px}
.xp-input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;color:var(--fg);font-family:var(--mono);font-size:13.5px;outline:none}
.xp-input:focus{border-color:var(--green-dim)}
.xp-go{background:var(--green);color:#000;border:none;border-radius:12px;padding:0 22px;font-weight:800;
  font-size:14px;cursor:pointer;font-family:inherit}
.xp-go:hover{filter:brightness(1.07)}
.xp-cols{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:820px){.xp-cols{grid-template-columns:1fr 1fr}}
.xp-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;min-height:120px}
.xp-h{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:12px}
.xp-list{display:flex;flex-direction:column}
.xp-row{padding:10px 8px;border-bottom:1px solid var(--line);border-radius:8px}
.xp-row:last-child{border-bottom:none}
.xp-tap{cursor:pointer;transition:background .12s}
.xp-tap:hover{background:var(--surface-2)}
.xp-row-main{display:flex;align-items:center;gap:9px;font-size:13.5px}
.xp-row-sub{font-size:11.5px;color:var(--fg-dim);margin-top:3px;font-family:var(--mono)}
.xp-badge{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--green);
  background:rgba(0,200,5,.08);border:1px solid var(--green-dim);border-radius:5px;padding:2px 6px}
.xp-mono{font-family:var(--mono)}
.xp-dim{color:var(--fg-faint)}
.xp-link{color:#5fa8ff}
.xp-tap-inline{cursor:pointer}.xp-tap-inline:hover{text-decoration:underline}
.xp-loading{display:flex;align-items:center;gap:9px;color:var(--fg-dim);font-size:13px;padding:14px 4px;font-family:var(--mono)}
.xp-spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--green);border-radius:50%;animation:sp .6s linear infinite}
.xp-err{color:var(--fg-dim);font-size:12.5px;padding:12px 4px;font-family:var(--mono)}
.xp-detail{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.xp-detail-h{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-faint)}
.xp-detail-id{font-size:13px;margin:6px 0 14px;word-break:break-all;color:var(--fg)}
.xp-stats{display:flex;gap:10px;flex-wrap:wrap}
.xp-stat{flex:1;min-width:90px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.xp-stat-l{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-faint)}
.xp-stat-v{font-size:15px;font-weight:700;margin-top:3px;font-family:var(--mono)}
.xp-kv{display:flex;flex-direction:column;gap:1px}
.xp-kvrow{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.xp-kvrow:last-child{border-bottom:none}
.xp-kvk{width:96px;flex:none;color:var(--fg-faint);font-size:12px}
.xp-kvv{flex:1;font-family:var(--mono);word-break:break-all}
.xp-ok{color:var(--green);font-weight:700}
.xp-bad{color:var(--amber);font-weight:700}

.member-bar{display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid rgba(0,200,5,.25);border-radius:12px;padding:11px 15px;margin-bottom:14px}
.member-bar-l{font-size:12.5px;color:var(--fg-dim)}
.member-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:7px;
  box-shadow:0 0 8px rgba(0,200,5,.6);vertical-align:middle}
.member-signout{background:transparent;border:1px solid var(--line);color:var(--fg-dim);
  border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.member-signout:hover{border-color:var(--green-dim);color:var(--fg)}

/* ---- explorer ---- */
.exp-wrap{max-width:1180px;margin:0 auto;padding:0 4px}
.exp-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.exp-badge{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--fg-dim);
  background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 11px}
.exp-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.exp-badge .addr{font-family:var(--mono);color:var(--fg)}
.exp-signout{margin-left:auto;font-size:12px;color:var(--fg-faint);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;padding:6px}
.exp-signout:hover{color:var(--fg-dim)}
.exp-search{display:flex;gap:8px;margin-bottom:20px}
.exp-search input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:14px 15px;color:var(--fg);font-family:var(--mono);font-size:13.5px;outline:none}
.exp-search input:focus{border-color:var(--green-dim)}
.exp-search button{background:var(--green);color:#000;border:none;border-radius:11px;padding:0 20px;
  font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
.exp-search button:active{transform:scale(.98)}

.exp-cols{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:760px){.exp-cols{grid-template-columns:1fr 1fr}}
.exp-panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.exp-panel-h{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
.exp-panel-h .t{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-dim)}
.exp-panel-h .live{font-size:10px;color:var(--green);display:flex;align-items:center;gap:5px}
.exp-panel-h .live .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.6s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.exp-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(36,40,36,.5);cursor:pointer;transition:background .12s}
.exp-row:last-child{border-bottom:none}
.exp-row:hover{background:var(--surface-2)}
.exp-row .lead{font-family:var(--mono);font-size:13px;color:var(--fg);font-weight:600}
.exp-row .mid{font-size:11.5px;color:var(--fg-dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-row .tail{font-size:11px;color:var(--fg-faint);font-family:var(--mono);flex:none}
.exp-row .pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;flex:none}
.pill-ok{background:rgba(0,200,5,.12);color:var(--green)}
.pill-fail{background:rgba(255,82,82,.12);color:var(--red)}
.exp-loading,.exp-empty{padding:24px 16px;text-align:center;color:var(--fg-faint);font-size:12.5px;font-family:var(--mono)}
.exp-err{padding:16px;margin-top:12px;background:rgba(255,82,82,.06);border:1px solid rgba(255,82,82,.2);border-radius:11px;
  font-size:12px;color:var(--red);font-family:var(--mono);line-height:1.5}
.exp-back{background:none;border:1px solid var(--line);color:var(--fg-dim);border-radius:9px;padding:8px 13px;
  font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:14px}
.exp-back:hover{border-color:var(--green-dim);color:var(--fg)}
.exp-detail{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px}
.exp-detail h2{font-size:15px;margin:0 0 4px;font-family:var(--mono);word-break:break-all}
.exp-kv{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;margin-top:14px;font-size:12.5px}
.exp-kv .k{color:var(--fg-faint);white-space:nowrap}
.exp-kv .v{font-family:var(--mono);color:var(--fg);word-break:break-all}

.exp-detail-h{margin-bottom:6px}
.exp-detail-h h2{font-size:14px;margin:2px 0;font-family:var(--mono);word-break:break-all;color:var(--fg)}
.exp-ens{font-size:15px;font-weight:800;color:var(--green);margin-bottom:2px}
.exp-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.exp-tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--surface-2);color:var(--fg-dim);border:1px solid var(--line)}
.exp-tag.tag-ok{background:rgba(0,200,5,.12);color:var(--green);border-color:transparent}
.exp-tag.tag-fail{background:rgba(255,82,82,.12);color:var(--red);border-color:transparent}
.exp-link{color:var(--green);cursor:pointer;text-decoration:none}
.exp-link:hover{text-decoration:underline}
.exp-tabs{display:flex;gap:4px;margin:18px 0 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.exp-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--fg-faint);padding:9px 12px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:-1px}
.exp-tab:hover{color:var(--fg-dim)}
.exp-tab.active{color:var(--fg);border-bottom-color:var(--green)}
.exp-lrow{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid rgba(36,40,36,.5);cursor:pointer;font-size:12px}
.exp-lrow:hover{background:var(--surface-2)}
.exp-lrow .lead{font-family:var(--mono);color:var(--fg);font-weight:600;flex:none}
.exp-lrow .mid{color:var(--fg-dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.exp-lrow .val{font-family:var(--mono);color:var(--fg-dim);flex:none;font-size:11.5px}
.exp-lrow .tail{font-family:var(--mono);color:var(--fg-faint);flex:none;font-size:11px}
.dir{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:4px;flex:none;letter-spacing:.04em}
.dir-out{background:rgba(255,176,32,.14);color:var(--amber)}
.dir-in{background:rgba(0,200,5,.12);color:var(--green)}

.stats-carousel{display:flex;align-items:stretch;gap:8px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:8px;margin-bottom:14px;min-height:132px}
.sarrow{background:var(--surface-2);border:1px solid var(--line);color:var(--fg-dim);border-radius:10px;
  width:40px;flex:none;font-size:22px;cursor:pointer;font-family:inherit;transition:.12s}
.sarrow:hover{color:var(--green);border-color:var(--green-dim)}
.sslide{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;text-align:center}
.slabel{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-faint)}
.svalue{font-size:34px;font-weight:900;letter-spacing:-.03em;color:var(--fg);margin:4px 0 2px;line-height:1;font-family:var(--mono)}
.ssub{font-size:12px;color:var(--fg-dim)}
.sbars{display:flex;align-items:flex-end;gap:2px;height:38px;margin-top:12px;width:min(320px,80%)}
.sbar{flex:1;border-radius:2px 2px 0 0;opacity:.85;min-height:3px}
.sdots{display:flex;gap:6px;margin-top:12px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--line)}
.sdot.on{background:var(--green)}

.exp-chart{margin-top:16px}
.exp-chart-h{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:6px}
.exp-chart-svg{width:100%;height:90px;display:block}
.tok-head{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.tok-logo{width:52px;height:52px;border-radius:50%;flex:none}
.tok-logo-ph{width:52px;height:52px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--fg-dim);font-weight:800;flex:none}
.tok-id .tok-name{font-size:19px;font-weight:800;letter-spacing:-.01em}
.tok-id .tok-sym{font-size:14px;color:var(--green);font-family:var(--mono);font-weight:700}
.tok-meta{font-family:var(--mono);font-size:11px;color:var(--fg-faint);word-break:break-all;margin-bottom:14px}
.tok-flags{margin-top:14px;display:flex;flex-direction:column;gap:7px}
.tok-flag{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:9px 12px;border-radius:9px;border:1px solid var(--line)}
.tok-flag .tf-dot{width:8px;height:8px;border-radius:50%;flex:none}
.tf-warn{background:rgba(255,176,32,.06)}.tf-warn .tf-dot{background:var(--amber)}
.tf-ok{background:rgba(0,200,5,.05)}.tf-ok .tf-dot{background:var(--green)}
.hbubs{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;padding:20px 10px;min-height:120px}
.hbub{border-radius:50%;background:rgba(0,200,5,.14);border:1px solid var(--green-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s}
.hbub:hover{background:rgba(0,200,5,.26)}
.hbub span{font-size:9px;color:var(--green);font-weight:700;font-family:var(--mono)}
.hbub-big{background:rgba(255,176,32,.16);border-color:rgba(255,176,32,.4)}

<script>
const TOKEN_CA='0xd3aF2D5d83Ff14Ed78Ce4ff9f8f98027B37cF47a';
const THRESHOLD_LABEL='100,000';
const BUY_URL='https://dexscreener.com/robinhood/'+TOKEN_CA;
const SESSION_KEY='rs_members_session';
const $=id=>document.getElementById(id);
const view=$('view');

const ICON_SHIELD='<svg viewBox="0 0 24 24" fill="none"><path d="M12 2.5 4.5 5.8v5.4c0 4.6 3.2 8.9 7.5 10.3 4.3-1.4 7.5-5.7 7.5-10.3V5.8L12 2.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="m8.8 12.1 2.2 2.2 4.2-4.6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function short(a){return a?a.slice(0,7)+'\u2026'+a.slice(-5):'';}

function renderGate(){
  document.body.classList.remove("exploring");
  view.innerHTML=
    '<div class="gate">'
    +'<h1 class="gate-h">Enter the members area</h1>'
    +'<p class="gate-p">Connect your wallet and sign a message to prove you hold $ROBINSCAN. This unlocks the explorer and every members tool.</p>'
    +'<div class="req"><span class="req-ico">'+ICON_SHIELD+'</span>'
    +'<div class="req-t">Requires <b>'+THRESHOLD_LABEL+' $ROBINSCAN</b> in your wallet</div></div>'
    +'<button class="btn" id="connectBtn">Connect wallet</button>'
    +'<div class="disclosure">'+ICON_SHIELD
    +'<div class="disclosure-t"><b>You will sign a message, not a transaction.</b> Signing is free, uses no gas, and cannot move your funds or approve spending. RobinScan never requests a transaction or token approval.</div></div>'
    +'<div class="status" id="status"></div>'
    +'</div>';
  $('connectBtn').addEventListener('click',connectAndVerify);
}

function setStatus(msg,isErr){const s=$('status');if(s){s.textContent=msg||'';s.className='status'+(isErr?' err':'');}}

async function connectAndVerify(){
  const btn=$('connectBtn');
  if(!window.ethereum){setStatus('No wallet found. Install MetaMask or another browser wallet.',true);return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Connecting\u2026';
  try{
    const accounts=await window.ethereum.request({method:'eth_requestAccounts'});
    const address=(accounts&&accounts[0]||'').toLowerCase();
    if(!address){throw new Error('No account selected');}
    setStatus('Requesting sign-in message\u2026');
    const nRes=await fetch('/api/auth/nonce?address='+address);
    const nData=await nRes.json();
    if(!nRes.ok){throw new Error(nData.error||'Could not start sign-in');}
    btn.innerHTML='<span class="spin"></span> Check your wallet\u2026';
    setStatus('Sign the message in your wallet to continue\u2026');
    const signature=await window.ethereum.request({method:'personal_sign',params:[nData.message,address]});
    btn.innerHTML='<span class="spin"></span> Verifying holdings\u2026';
    setStatus('Checking your $ROBINSCAN balance\u2026');
    const vRes=await fetch('/api/auth/verify',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({address,signature})});
    const vData=await vRes.json();
    if(vRes.status===403&&vData.error==='insufficient_holdings'){renderShort(vData,address);return;}
    if(!vRes.ok){throw new Error((vData.error||'verification_failed')+(vData.detail?': '+vData.detail:''));}
    localStorage.setItem(SESSION_KEY,JSON.stringify({token:vData.token,address,ts:Date.now()}));
    renderMember(address);
  }catch(e){
    const m=(e&&e.message)||String(e);
    if(/reject|denied|user denied/i.test(m)){setStatus('Sign-in cancelled. Nothing was sent.',false);}
    else{setStatus(m,true);}
    btn.disabled=false;btn.textContent='Connect wallet';
  }
}

function renderShort(data,address){
  view.innerHTML=
    '<div class="gate">'
    +'<h1 class="gate-h">Almost there</h1>'
    +'<p class="gate-p">Your wallet is connected, but it doesn\u2019t hold enough $ROBINSCAN yet.</p>'
    +'<div class="short">'
    +'<div class="short-h">You need more $ROBINSCAN</div>'
    +'<div class="short-p">You hold <span class="mono">'+(data.have||0).toLocaleString()+'</span> \u00b7 '
    +'entry requires <span class="mono">'+(data.need||100000).toLocaleString()+'</span>. '
    +'You\u2019re <span class="mono">'+(data.short||0).toLocaleString()+'</span> short.</div>'
    +'<a class="btn" href="'+BUY_URL+'" target="_blank" rel="noopener">Get $ROBINSCAN</a>'
    +'</div>'
    +'<button class="btn btn-ghost" id="retryBtn" style="margin-top:10px">Check again</button>'
    +'</div>';
  $('retryBtn').addEventListener('click',connectAndVerify);
}

function renderMember(address){ renderExplorer(address); }

async function boot(){
  const raw=localStorage.getItem(SESSION_KEY);
  if(raw){
    try{
      const s=JSON.parse(raw);
      const r=await fetch('/api/x/me',{headers:{authorization:'Bearer '+s.token}});
      if(r.ok){const d=await r.json();renderMember(d.address);return;}
      localStorage.removeItem(SESSION_KEY);
    }catch(e){localStorage.removeItem(SESSION_KEY);}
  }
  renderGate();
}

// ---------- explorer ----------
// ---- fee claim (VladdyHook: owed/claimOwed, pays ETH to the connected wallet) ----
// Hook contract address — fill in the deployed VladdyHook address.
const HOOK_ADDR = '0xAA33aae40B5C62E9bD0EF2b42163000CbB6780cC'; // deployed VladdyHook
const SEL_OWED = '0xdf18e047';      // owed(address)
const SEL_CLAIM = '0xf2652d9c';     // claimOwed()

function feeEth(wei){
  try{
    const v=BigInt(String(wei));
    const whole=v/(10n**18n), frac=(v%(10n**18n)).toString().padStart(18,'0').replace(/0+$/,'');
    return frac ? (whole.toString()+'.'+frac.slice(0,6)) : whole.toString();
  }catch(e){ return '0'; }
}

// read owed(wallet) via the wallet's own RPC (public read, no gas, no signature)
async function readOwed(wallet){
  if(!window.ethereum) return null;
  if(/^0x0+$/.test(HOOK_ADDR)) return null; // not configured yet
  const data = SEL_OWED + wallet.toLowerCase().replace('0x','').padStart(64,'0');
  try{
    const res = await window.ethereum.request({ method:'eth_call', params:[{ to:HOOK_ADDR, data }, 'latest'] });
    if(!res || res==='0x') return 0n;
    return BigInt(res);
  }catch(e){ return null; }
}

async function renderFeeSection(wallet){
  const host = document.getElementById('feeSection');
  if(!host) return;
  if(/^0x0+$/.test(HOOK_ADDR)){ host.innerHTML=''; return; } // hidden until configured
  const owed = await readOwed(wallet);
  if(owed===null){ host.innerHTML=''; return; }
  const has = owed>0n;
  host.innerHTML =
    '<div class="fee-card">'
    +'<div class="fee-left">'
    +'<div class="fee-label">Claimable trading fees</div>'
    +'<div class="fee-amount">'+feeEth(owed)+' <span>ETH</span></div>'
    +'<div class="fee-sub">'+(has?'Accrued from tokens you receive fees on':'No fees to claim right now')+'</div>'
    +'</div>'
    +'<button class="fee-btn" id="feeClaimBtn"'+(has?'':' disabled')+'>'+(has?'Claim to wallet':'Nothing to claim')+'</button>'
    +'</div>'
    +'<div class="fee-status" id="feeStatus"></div>';
  const btn=document.getElementById('feeClaimBtn');
  if(btn && has) btn.addEventListener('click',()=>claimFees(wallet));
}

function feeStatus(msg,cls){ const s=document.getElementById('feeStatus'); if(s){ s.textContent=msg||''; s.className='fee-status'+(cls?' '+cls:''); } }

async function claimFees(wallet){
  const btn=document.getElementById('feeClaimBtn');
  if(!window.ethereum){ feeStatus('No wallet found.','err'); return; }
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Confirm in wallet\u2026';
  feeStatus('This sends a transaction from your wallet to claim your ETH.','');
  try{
    const txHash = await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{ from:wallet, to:HOOK_ADDR, data:SEL_CLAIM }],
    });
    feeStatus('Claim submitted \u2014 waiting for confirmation\u2026','');
    btn.innerHTML='<span class="spin"></span> Confirming\u2026';
    // poll for the receipt
    let receipt=null, tries=0;
    while(!receipt && tries<40){
      await new Promise(r=>setTimeout(r,1500)); tries++;
      try{ receipt = await window.ethereum.request({ method:'eth_getTransactionReceipt', params:[txHash] }); }catch(e){}
    }
    if(receipt && (receipt.status==='0x1'||receipt.status===1)){
      feeStatus('Claimed. ETH is on its way to your wallet.','ok');
      setTimeout(()=>renderFeeSection(wallet), 2500); // refresh owed (should be 0)
    } else if(receipt){
      feeStatus('Claim transaction failed on-chain.','err');
      btn.disabled=false; btn.textContent='Try again';
    } else {
      feeStatus('Submitted. Check your wallet for confirmation.','');
    }
  }catch(e){
    const m=(e&&e.message)||String(e);
    if(/reject|denied/i.test(m)) feeStatus('Claim cancelled. Nothing was sent.','');
    else feeStatus(m,'err');
    btn.disabled=false; btn.textContent='Claim to wallet';
  }
}

function authToken(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||'{}').token||''; }catch(e){ return ''; } }

async function proxy(path, q){
  const u = '/api/x/proxy?path=' + encodeURIComponent(path) + (q?('&q='+encodeURIComponent(q)):'');
  const r = await fetch(u, { headers:{ authorization:'Bearer '+authToken() } });
  if(r.status===401){ localStorage.removeItem(SESSION_KEY); boot(); throw new Error('session expired'); }
  const j = await r.json();
  if(!r.ok || j.error){ throw new Error(j.error||('proxy '+r.status)); }
  return j.data;
}
// tolerate an endpoint that 404s/500s on this chain — return null instead of throwing
async function proxySoft(path, q){ try{ return await proxy(path,q); }catch(e){ return null; } }

function fmtAge(iso){
  if(!iso) return '';
  const s = Math.max(0, (Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return Math.floor(s)+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function shortHash(h){ return h?h.slice(0,10)+'\u2026'+h.slice(-6):''; }
function shortAddr(a){ return a?a.slice(0,7)+'\u2026'+a.slice(-5):''; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// wei (string/number) -> human ETH
function fmtEth(wei){
  if(wei==null||wei==='') return '\u2014';
  try{
    const v = BigInt(String(wei).split('.')[0]);
    const whole = v/(10n**18n), frac=(v%(10n**18n)).toString().padStart(18,'0').replace(/0+$/,'');
    const s = frac ? (whole.toString()+'.'+frac.slice(0,8).replace(/0+$/,'')) : whole.toString();
    return s+' ETH';
  }catch(e){ return String(wei); }
}
function fmtNum(n){ if(n==null||n==='') return '\u2014'; const x=Number(n); return isFinite(x)?x.toLocaleString():String(n); }
function addrField(o){ // Blockscout nests address objects: {hash, name, is_contract, ens_domain_name}
  if(!o) return '\u2014';
  if(typeof o==='string') return o;
  return o.ens_domain_name || o.name || o.hash || '\u2014';
}
function addrHash(o){ if(!o) return ''; return typeof o==='string'?o:(o.hash||''); }

// ---- explorer shell ----
function renderExplorer(address){
  document.body.classList.add("exploring");
  view.innerHTML =
    '<div class="exp-wrap">'
    +'<div class="exp-top">'
    +'<div class="exp-badge"><span class="dot"></span><span>Holder</span><span class="addr">'+shortAddr(address)+'</span></div>'

    +'</div>'
    +'<div id="feeSection"></div>'
    +'<div class="exp-search">'
    +'<input id="expQuery" placeholder="Search address, tx hash, block, or token\u2026" autocomplete="off" spellcheck="false">'
    +'<button id="expGo">Search</button>'
    +'</div>'
    +'<div id="expBody"></div>'
    +'</div>';
  document.getElementById('expSignOut').addEventListener('click',function(){localStorage.removeItem(SESSION_KEY);boot();});
  const qi=document.getElementById('expQuery');
  document.getElementById('expGo').addEventListener('click',()=>routeSearch(qi.value.trim()));
  qi.addEventListener('keydown',e=>{ if(e.key==='Enter') routeSearch(qi.value.trim()); });
  renderFeeSection(address);
  renderLanding();
}

function routeSearch(q){
  if(!q) return;
  if(/^0x[0-9a-fA-F]{64}$/.test(q)) return showTx(q);
  if(/^0x[0-9a-fA-F]{40}$/.test(q)) return showAddress(q);
  if(/^\d+$/.test(q)) return showBlock(q);
  if(/\.eth$/i.test(q)) return showSearch(q);
  return showSearch(q);
}

const expBody = () => document.getElementById('expBody');
function backBar(){ return '<button class="exp-back" onclick="renderLanding()">\u2190 Back to overview</button>'; }
function loading(){ return '<div class="exp-loading">loading\u2026</div>'; }
function errBox(m){ return '<div class="exp-err">'+esc(m)+'</div>'; }
function kvRow(k,v){ return '<span class="k">'+k+'</span><span class="v">'+v+'</span>'; }
// clickable address/hash inside details
function addrLink(o){ const h=addrHash(o); if(!h) return '\u2014'; return '<a class="exp-link" onclick="showAddress(\''+h+'\')">'+esc(addrField(o))+'</a>'; }
function txLink(h){ return h?'<a class="exp-link" onclick="showTx(\''+h+'\')">'+shortHash(h)+'</a>':'\u2014'; }

// ---- stats carousel (landing top) ----
let statsIdx=0, statsSlides=[], statsData=null;

function statNum(n){ if(n==null||n==='') return '\u2014'; const x=Number(n); return isFinite(x)?x.toLocaleString():String(n); }
function statUsd(n){ if(n==null||n==='') return '\u2014'; const x=Number(n); if(!isFinite(x)) return String(n);
  if(x>=1e9) return '$'+(x/1e9).toFixed(2)+'B'; if(x>=1e6) return '$'+(x/1e6).toFixed(2)+'M';
  if(x>=1e3) return '$'+(x/1e3).toFixed(1)+'K'; return '$'+x.toFixed(2); }

// mini bar chart from an array of {date,value} or numbers
function miniBars(series, color){
  if(!series || !series.length) return '';
  const vals = series.map(p=>Number(p.value!=null?p.value:p)).filter(v=>isFinite(v));
  if(!vals.length) return '';
  const max = Math.max(...vals,1);
  const bars = vals.slice(-24).map(v=>{
    const h = Math.max(3, (v/max)*100);
    return '<div class="sbar" style="height:'+h+'%;background:'+(color||'var(--green)')+'"></div>';
  }).join('');
  return '<div class="sbars">'+bars+'</div>';
}

async function loadStats(){
  statsData = await proxySoft('/api/v2/stats');
  const txChart = await proxySoft('/api/v2/stats/charts/transactions');
  const s = statsData || {};
  const gas = s.gas_prices || {};
  const txSeries = (txChart && (txChart.chart_data||txChart.chart||txChart)) || [];

  statsSlides = [
    { label:'Gas tracker', value:(gas.average!=null?gas.average+' Gwei':(gas.slow!=null?gas.slow+' Gwei':'\u2014')),
      sub:(gas.fast!=null?('fast '+gas.fast+' \u00b7 slow '+(gas.slow!=null?gas.slow:'\u2014')):''), chart:'' },
    { label:'Transactions today', value:statNum(s.transactions_today), sub:'in the last 24h',
      chart: miniBars(txSeries,'var(--green)') },
    { label:'Total transactions', value:statNum(s.total_transactions), sub:'all time', chart:'' },
    { label:'Total addresses', value:statNum(s.total_addresses), sub:'wallets seen', chart:'' },
    { label:'Total blocks', value:statNum(s.total_blocks), sub:(s.average_block_time!=null?('~'+(Number(s.average_block_time)/1000).toFixed(1)+'s block time'):''), chart:'' },
  ];
  if(s.market_cap!=null && Number(s.market_cap)>0){
    statsSlides.push({ label:'Market cap', value:statUsd(s.market_cap), sub:(s.coin_price!=null?('coin '+statUsd(s.coin_price)):''), chart:'' });
  }
  statsIdx = 0;
  renderStatsSlide();
}

function renderStatsSlide(){
  const host = document.getElementById('statsCarousel');
  if(!host) return;
  if(!statsSlides.length){ host.innerHTML = '<div class="exp-empty">stats unavailable</div>'; return; }
  const sl = statsSlides[statsIdx];
  const dots = statsSlides.map((_,i)=>'<span class="sdot'+(i===statsIdx?' on':'')+'"></span>').join('');
  host.innerHTML =
    '<button class="sarrow" id="sPrev" aria-label="Previous">\u2039</button>'
    +'<div class="sslide">'
    +'<div class="slabel">'+sl.label+'</div>'
    +'<div class="svalue">'+sl.value+'</div>'
    +(sl.sub?'<div class="ssub">'+sl.sub+'</div>':'')
    +(sl.chart||'')
    +'<div class="sdots">'+dots+'</div>'
    +'</div>'
    +'<button class="sarrow" id="sNext" aria-label="Next">\u203a</button>';
  document.getElementById('sPrev').onclick=()=>{ statsIdx=(statsIdx-1+statsSlides.length)%statsSlides.length; renderStatsSlide(); };
  document.getElementById('sNext').onclick=()=>{ statsIdx=(statsIdx+1)%statsSlides.length; renderStatsSlide(); };
}

// ---- ADDRESS view (Blockscout-like: details grid + tabs) ----
async function showAddress(addr){
  if(landingTimer){clearInterval(landingTimer);landingTimer=null;}
  expBody().innerHTML = backBar()+loading();
  // pull details + counters in parallel; counters holds tx/transfer/token counts + gas
  const [d, counters] = await Promise.all([
    proxySoft('/api/v2/addresses/'+addr),
    proxySoft('/api/v2/addresses/'+addr+'/counters'),
  ]);
  if(!d){ expBody().innerHTML = backBar()+errBox('Could not load this address.'); return; }

  // Type detection. A 7702 smart wallet has code (is_contract=true) but is
  // really a USER WALLET with delegated code — Blockscout shows "EOA + code".
  // Signals it's a user wallet: a delegation target (implementations) or an
  // explicit smart-wallet flag. A plain deployed contract has code but no
  // delegation and usually no ENS.
  const hasDelegate = !!(d.implementations && d.implementations.length);
  const isSmartWallet = d.is_smart_contract_wallet || hasDelegate;
  const isPlainContract = d.is_contract && !isSmartWallet;
  const typeLabel = isSmartWallet ? 'Smart wallet (EOA + code)'
      : (isPlainContract ? 'Contract' : 'Wallet');
  const ens = d.ens_domain_name || (d.name && /\.eth$/i.test(d.name) ? d.name : null);

  const txCount = (counters && (counters.transactions_count!=null?counters.transactions_count:counters.transaction_count))
      || d.transactions_count || d.transaction_count;
  const transferCount = counters && (counters.token_transfers_count!=null?counters.token_transfers_count:counters.transfers_count);
  const gasUsed = counters && counters.gas_usage_count;

  expBody().innerHTML = backBar()
    +'<div class="exp-detail">'
    +'<div class="exp-detail-h">'
    + (ens?'<div class="exp-ens">'+esc(ens)+'</div>':'')
    +'<h2>'+esc(addr)+'</h2>'
    +'<div class="exp-tags"><span class="exp-tag">'+typeLabel+'</span>'
    + (hasDelegate?'<span class="exp-tag">delegated</span>':'')
    + (d.token?'<span class="exp-tag exp-tag-link" onclick="showToken(\''+addr+'\')">view as token \u2197</span>':'')
    +'</div></div>'
    +'<div class="exp-kv">'
    + kvRow('Balance', fmtEth(d.coin_balance))
    + kvRow('Transactions', fmtNum(txCount))
    + (transferCount!=null?kvRow('Token transfers', fmtNum(transferCount)):'')
    + (gasUsed!=null?kvRow('Gas used', fmtNum(gasUsed)):'')
    + (d.implementations&&d.implementations[0]?kvRow('Delegated to', addrLink(d.implementations[0])):'')
    +'</div>'
    +'<div class="exp-tabs" id="addrTabs">'
    +'<button class="exp-tab active" data-tab="txns">Transactions</button>'
    +'<button class="exp-tab" data-tab="tokens">Tokens</button>'
    +'<button class="exp-tab" data-tab="transfers">Token transfers</button>'
    +'</div>'
    +'<div id="addrTabBody">'+loading()+'</div>'
    +'<div id="addrChart"></div>'
    +'</div>';

  const tabBody = () => document.getElementById('addrTabBody');
  const loadTab = async (tab) => {
    tabBody().innerHTML = loading();
    if(tab==='txns'){
      const t = await proxySoft('/api/v2/addresses/'+addr+'/transactions');
      const items = t && (t.items||t) || [];
      tabBody().innerHTML = items.length ? items.slice(0,25).map(tx=>{
        const ok=(tx.status==='ok'||tx.result==='success');
        const out = addrHash(tx.from)===addr.toLowerCase();
        return '<div class="exp-lrow" onclick="showTx(\''+tx.hash+'\')">'
          +'<span class="lead">'+shortHash(tx.hash)+'</span>'
          +'<span class="dir '+(out?'dir-out':'dir-in')+'">'+(out?'OUT':'IN')+'</span>'
          +'<span class="mid">'+(out?'To ':'From ')+shortAddr(out?addrHash(tx.to):addrHash(tx.from))+'</span>'
          +'<span class="val">'+fmtEth(tx.value)+'</span>'
          +'<span class="tail">'+fmtAge(tx.timestamp)+'</span>'
          +'<span class="pill '+(ok?'pill-ok':'pill-fail')+'">'+(ok?'ok':'fail')+'</span></div>';
      }).join('') : '<div class="exp-empty">no transactions</div>';
    } else if(tab==='tokens'){
      // this chain may serve token holdings under either path; try both
      let t = await proxySoft('/api/v2/addresses/'+addr+'/token-balances');
      let items = t && (Array.isArray(t)?t:(t.items||t.token_balances||[])) || [];
      if(!items.length){
        const t2 = await proxySoft('/api/v2/addresses/'+addr+'/tokens');
        items = t2 && (Array.isArray(t2)?t2:(t2.items||[])) || [];
      }
      tabBody().innerHTML = items.length ? items.slice(0,50).map(tb=>{
        // handle both {token:{...}, value} and a flat token object
        const tok = tb.token || tb || {};
        const rawVal = tb.value!=null?tb.value:(tb.balance!=null?tb.balance:'0');
        const dec = Number(tok.decimals!=null?tok.decimals:18);
        let bal='\u2014';
        try{ const v=BigInt(String(rawVal).split('.')[0]); bal=(v/(10n**BigInt(dec))).toLocaleString(); }catch(e){}
        const taddr = tok.address || tok.address_hash || '';
        return '<div class="exp-lrow"'+(taddr?' onclick="showAddress(\''+taddr+'\')"':'')+'>'
          +'<span class="lead">'+esc(tok.symbol||tok.name||'?')+'</span>'
          +'<span class="mid">'+esc(tok.name||'')+'</span>'
          +'<span class="val">'+bal+'</span></div>';
      }).join('') : '<div class="exp-empty">no tokens</div>';
    } else if(tab==='transfers'){
      const t = await proxySoft('/api/v2/addresses/'+addr+'/token-transfers');
      const items = t && (t.items||t) || [];
      tabBody().innerHTML = items.length ? items.slice(0,25).map(tr=>{
        const tok=tr.token||{};
        return '<div class="exp-lrow" onclick="showTx(\''+(tr.tx_hash||tr.transaction_hash||'')+'\')">'
          +'<span class="lead">'+esc(tok.symbol||'?')+'</span>'
          +'<span class="mid">'+shortAddr(addrHash(tr.from))+' \u2192 '+shortAddr(addrHash(tr.to))+'</span>'
          +'<span class="tail">'+fmtAge(tr.timestamp)+'</span></div>';
      }).join('') : '<div class="exp-empty">no token transfers</div>';
    }
  };
  document.querySelectorAll('#addrTabs .exp-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#addrTabs .exp-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      loadTab(btn.getAttribute('data-tab'));
    });
  });
  loadTab('txns');
  appendAddressChart(addr);
}

// ---- simple SVG area chart (bottom of detail sections) ----
function areaChart(series, opts){
  opts = opts || {};
  const vals = (series||[]).map(p=>Number(p.value!=null?p.value:p)).filter(v=>isFinite(v));
  if(vals.length<2) return '';
  const W=600,H=90,pad=6;
  const lo=Math.min(...vals),hi=Math.max(...vals),range=Math.max(hi-lo,Math.abs(hi)*1e-9,1e-9);
  const x=i=>pad+(i/(vals.length-1))*(W-2*pad);
  const y=v=>H-pad-((v-lo)/range)*(H-2*pad);
  const line=vals.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  const area=line+' L'+(W-pad)+' '+H+' L'+pad+' '+H+' Z';
  const c=opts.color||'var(--green)';
  return '<div class="exp-chart"><div class="exp-chart-h">'+(opts.title||'')+'</div>'
    +'<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" class="exp-chart-svg">'
    +'<defs><linearGradient id="ac" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0" stop-color="'+c+'" stop-opacity="0.28"/><stop offset="1" stop-color="'+c+'" stop-opacity="0"/></linearGradient></defs>'
    +'<path d="'+area+'" fill="url(#ac)"/><path d="'+line+'" fill="none" stroke="'+c+'" stroke-width="2" stroke-linejoin="round"/>'
    +'</svg></div>';
}

// load + append a balance-history chart to the address detail
async function appendAddressChart(addr){
  const host=document.getElementById('addrChart'); if(!host) return;
  const h = await proxySoft('/api/v2/addresses/'+addr+'/coin-balance-history-by-day');
  const items = (h && (h.items||h.days||h)) || [];
  // shape: [{date, value}] where value may be wei -> normalize to ETH float
  const series = items.map(p=>{
    let v=p.value!=null?p.value:p.balance;
    try{ v=Number(BigInt(String(v).split('.')[0])/(10n**15n))/1000; }catch(e){ v=Number(v); }
    return { value:v };
  }).filter(p=>isFinite(p.value));
  host.innerHTML = series.length>=2 ? areaChart(series,{title:'Balance over time (ETH)'}) : '';
}

// ---- TOKEN view (memecoin scan: name/ticker/logo/holders + quick flags) ----
async function showToken(addr){
  if(landingTimer){clearInterval(landingTimer);landingTimer=null;}
  expBody().innerHTML = backBar()+loading();
  const [tok, counters, holdersResp] = await Promise.all([
    proxySoft('/api/v2/tokens/'+addr),
    proxySoft('/api/v2/tokens/'+addr+'/counters'),
    proxySoft('/api/v2/tokens/'+addr+'/holders'),
  ]);
  if(!tok){ expBody().innerHTML = backBar()+errBox('Could not load this token.'); return; }

  const dec = Number(tok.decimals||18);
  const supplyRaw = tok.total_supply||'0';
  let supply='\u2014';
  try{ supply=(BigInt(String(supplyRaw).split('.')[0])/(10n**BigInt(dec))).toLocaleString(); }catch(e){}
  const holders = tok.holders||tok.holder_count||(counters&&counters.token_holders_count)||'\u2014';
  const logo = tok.icon_url||tok.image_url||(tok.token&&tok.token.icon_url)||null;
  const sym = tok.symbol||'?';
  const name = tok.name||'Unknown token';

  // holder list for the bubble map + concentration flags
  const hitems = (holdersResp && (holdersResp.items||holdersResp)) || [];
  const total = (()=>{ try{ return BigInt(String(supplyRaw).split('.')[0]); }catch(e){ return 0n; } })();
  const holderData = hitems.slice(0,40).map(h=>{
    let pct=0; try{ const v=BigInt(String(h.value||'0').split('.')[0]); pct= total>0n? Number(v*10000n/total)/100 : 0; }catch(e){}
    const a = (h.address&&h.address.hash)||h.address_hash||h.address||'';
    return { addr:a, pct };
  }).filter(h=>h.pct>0);

  // quick risk flags (data-derived, no heavy sim — that lives in the full scanner)
  const top = holderData[0];
  const top5 = holderData.slice(0,5).reduce((s,h)=>s+h.pct,0);
  const flags = [];
  if(top && top.pct>=50) flags.push({sev:'warn',t:'Top holder controls '+top.pct.toFixed(1)+'% (may be the LP or a whale)'});
  else if(top && top.pct>=25) flags.push({sev:'warn',t:'Top holder controls '+top.pct.toFixed(1)+'%'});
  if(top5>=80) flags.push({sev:'warn',t:'Top 5 hold '+top5.toFixed(0)+'% \u2014 concentrated'});
  if(holderData.length<10) flags.push({sev:'warn',t:'Few holders ('+holderData.length+') \u2014 early or thin'});
  if(!flags.length) flags.push({sev:'ok',t:'No obvious concentration flags in holder data'});

  expBody().innerHTML = backBar()
    +'<div class="exp-detail">'
    +'<div class="tok-head">'
    +(logo?'<img class="tok-logo" src="'+esc(logo)+'" alt="" onerror="this.style.display=\'none\'">':'<div class="tok-logo-ph">'+esc(sym.slice(0,3).toUpperCase())+'</div>')
    +'<div class="tok-id"><div class="tok-name">'+esc(name)+'</div><div class="tok-sym">$'+esc(sym)+'</div></div>'
    +'</div>'
    +'<div class="tok-meta">'+esc(addr)+'</div>'
    +'<div class="exp-kv">'
    + kvRow('Holders', fmtNum(holders))
    + kvRow('Total supply', supply)
    + kvRow('Decimals', dec)
    + (tok.type?kvRow('Type', esc(tok.type)):'')
    +'</div>'
    // quick flags
    +'<div class="tok-flags">'
    + flags.map(f=>'<div class="tok-flag '+(f.sev==='ok'?'tf-ok':'tf-warn')+'"><span class="tf-dot"></span>'+esc(f.t)+'</div>').join('')
    +'</div>'
    // holder map (bubbles)
    +'<div class="exp-tabs"><button class="exp-tab active">Holder map</button></div>'
    + renderHolderBubbles(holderData)
    // deep link to the full scanner for the heavy honeypot/sell sim
    +'<a class="tok-fullscan" href="https://www.robinscan4u.com/?token='+esc(addr)+'" target="_blank" rel="noopener">Run full honeypot + sell-test scan on RobinScan \u2197</a>'
    +'</div>';
}

function renderHolderBubbles(holders){
  if(!holders.length) return '<div class="exp-empty">no holder data</div>';
  const max = Math.max(...holders.map(h=>h.pct),1);
  const bubbles = holders.slice(0,24).map(h=>{
    const size = 26 + (h.pct/max)*54; // 26-80px
    const big = h.pct>=25;
    return '<div class="hbub'+(big?' hbub-big':'')+'" style="width:'+size+'px;height:'+size+'px" '
      +'title="'+esc(h.addr)+' \u2014 '+h.pct.toFixed(2)+'%" '
      +'onclick="showAddress(\''+esc(h.addr)+'\')">'
      +'<span>'+h.pct.toFixed(h.pct<1?1:0)+'%</span></div>';
  }).join('');
  return '<div class="hbubs">'+bubbles+'</div>';
}

async function showSearch(q){
  if(landingTimer){clearInterval(landingTimer);landingTimer=null;}
  expBody().innerHTML = backBar()+loading();
  const d = await proxySoft('/api/v2/search', q);
  const items = d && (d.items||d||[]) || [];
  expBody().innerHTML = backBar()
    +'<div class="exp-panel"><div class="exp-panel-h"><span class="t">Results for "'+esc(q)+'"</span></div>'
    +(items.length ? items.slice(0,25).map(it=>{
      const type=it.type||'?';
      const label=it.name||it.address||it.address_hash||it.block_hash||it.tx_hash||it.transaction_hash||'';
      const click = type==='token' ? 'showToken(\''+(it.address||it.address_hash)+'\')' : type==='address'||type==='contract' ? 'showAddress(\''+(it.address||it.address_hash)+'\')'
        : type==='transaction' ? 'showTx(\''+(it.tx_hash||it.transaction_hash)+'\')'
        : type==='block' ? 'showBlock(\''+(it.block_number||it.block_hash)+'\')' : '';
      return '<div class="exp-lrow"'+(click?' onclick="'+click+'"':'')+'>'
        +'<span class="dir dir-in">'+esc(type)+'</span>'
        +'<span class="mid">'+esc(String(label))+'</span></div>';
    }).join('') : '<div class="exp-empty">no results</div>')
    +'</div>';
}
