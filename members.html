<style>
:root{
  --bg:#080908;--surface:#0f110f;--surface-2:#171a17;--line:#242824;
  --fg:#fff;--fg-dim:#9aa09a;--fg-faint:#5f655f;
  --green:#00c805;--green-dim:#0a4512;--red:#ff5252;--amber:#ffb020;
  --r:16px;--mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--fg);
  font-family:'Inter',system-ui,-apple-system,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:48px 18px 60px;min-height:100vh}
.brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
.logo{width:38px;height:38px;border-radius:50%}
.name{font-size:23px;font-weight:800;letter-spacing:-.02em}
.members-badge{font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--green);
  border:1px solid var(--green-dim);border-radius:5px;padding:3px 7px;text-transform:uppercase}
.sub{text-align:center;color:var(--fg-dim);font-size:13.5px;margin:0 0 30px}
.gate{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:26px 22px;animation:rise .3s ease}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.gate-h{font-size:19px;font-weight:800;letter-spacing:-.01em;margin:0 0 6px}
.gate-p{font-size:13.5px;color:var(--fg-dim);line-height:1.6;margin:0 0 20px}
.req{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:11px;margin-bottom:18px}
.req-ico{width:18px;height:18px;color:var(--green);flex:none}
.req-t{font-size:13px}.req-t b{color:var(--fg)}
.btn{width:100%;background:var(--green);color:#000;border:none;border-radius:12px;padding:15px;
  font-weight:800;font-size:15.5px;cursor:pointer;font-family:inherit;letter-spacing:-.01em;
  transition:transform .1s,filter .15s;display:flex;align-items:center;justify-content:center;gap:9px;text-decoration:none}
.btn:hover{filter:brightness(1.07)}.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.7;cursor:default}
.btn-ghost{background:var(--surface-2);color:var(--fg);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--green-dim);filter:none}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.35);border-top-color:#000;border-radius:50%;animation:sp .55s linear infinite}
.btn-ghost .spin{border-color:rgba(255,255,255,.3);border-top-color:#fff}
@keyframes sp{to{transform:rotate(360deg)}}
.disclosure{margin-top:16px;padding:13px 15px;background:linear-gradient(180deg,rgba(0,200,5,.05),rgba(0,200,5,.01));
  border:1px solid rgba(0,200,5,.22);border-radius:12px;display:flex;gap:11px;align-items:flex-start}
.disclosure svg{width:19px;height:19px;color:var(--green);flex:none;margin-top:1px}
.disclosure-t{font-size:11.8px;color:var(--fg-dim);line-height:1.6}
.disclosure-t b{color:var(--fg)}
.status{margin-top:16px;font-size:12.5px;color:var(--fg-faint);text-align:center;min-height:18px;font-family:var(--mono)}
.status.err{color:var(--red)}
.short{margin-top:16px;padding:16px;background:rgba(255,176,32,.06);border:1px solid rgba(255,176,32,.28);border-radius:12px}
.short-h{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:5px}
.short-p{font-size:12.5px;color:var(--fg-dim);line-height:1.55;margin-bottom:12px}
.short-p .mono{font-family:var(--mono);color:var(--fg)}
.member{text-align:center;padding:34px 22px;background:linear-gradient(180deg,rgba(0,200,5,.07),var(--surface));
  border:1px solid rgba(0,200,5,.3);border-radius:var(--r);animation:rise .3s ease}
.member-check{width:52px;height:52px;margin:0 auto 14px;color:var(--green)}
.member-h{font-size:22px;font-weight:900;letter-spacing:-.02em}
.member-addr{font-family:var(--mono);font-size:12px;color:var(--fg-dim);margin-top:6px}
.member-p{font-size:13px;color:var(--fg-dim);margin-top:12px;line-height:1.6}
.member-actions{display:flex;gap:8px;margin-top:20px}
.member-actions .btn{flex:1}
.foot{text-align:center;font-size:11px;color:var(--fg-faint);margin-top:26px;line-height:1.55}
.foot a{color:var(--fg-dim)}
</style>
</head>

  <p class="sub">Holder-only tools for the Robinhood Chain ecosystem.</p>
  <div id="view"></div>
  <div class="foot">
    The scanner stays free and open at <a href="/">robinscan4u.com</a> — no wallet, no signature.<br>
    Members tools require holding $ROBINSCAN. Not affiliated with Robinhood Markets, Inc.

<script>
const TOKEN_CA='0xd3aF2D5d83Ff14Ed78Ce4ff9f8f98027B37cF47a';
const THRESHOLD_LABEL='100,000';
const BUY_URL='https://dexscreener.com/robinhood/'+TOKEN_CA;
const SESSION_KEY='rs_members_session';
const $=id=>document.getElementById(id);
const view=$('view');

const ICON_SHIELD='<svg viewBox="0 0 24 24" fill="none"><path d="M12 2.5 4.5 5.8v5.4c0 4.6 3.2 8.9 7.5 10.3 4.3-1.4 7.5-5.7 7.5-10.3V5.8L12 2.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="m8.8 12.1 2.2 2.2 4.2-4.6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const ICON_CHECK='<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6"/><path d="m8 12.2 2.6 2.6L16 9" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function short(a){return a?a.slice(0,7)+'\u2026'+a.slice(-5):'';}

function renderGate(){
  view.innerHTML=
    '<div class="gate">'
    +'<h1 class="gate-h">Enter the members area</h1>'
    +'<p class="gate-p">Connect your wallet and sign a message to prove you hold $ROBINSCAN. This unlocks the explorer and every members tool.</p>'
    +'<div class="req"><span class="req-ico">'+ICON_SHIELD+'</span>'
    +'<div class="req-t">Requires <b>'+THRESHOLD_LABEL+' $ROBINSCAN</b> in your wallet</div></div>'
    +'<button class="btn" id="connectBtn">Connect wallet</button>'
    +'<div class="disclosure">'+ICON_SHIELD
    +'<div class="disclosure-t"><b>You will sign a message, not a transaction.</b> Signing is free, uses no gas, and cannot move your funds or approve spending. RobinScan never requests a transaction or token approval.</div></div>'
    +'<div class="status" id="status"></div>'
    +'</div>';
  $('connectBtn').addEventListener('click',connectAndVerify);
}

function setStatus(msg,isErr){const s=$('status');if(s){s.textContent=msg||'';s.className='status'+(isErr?' err':'');}}

async function connectAndVerify(){
  const btn=$('connectBtn');
  if(!window.ethereum){setStatus('No wallet found. Install MetaMask or another browser wallet.',true);return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Connecting\u2026';
  try{
    const accounts=await window.ethereum.request({method:'eth_requestAccounts'});
    const address=(accounts&&accounts[0]||'').toLowerCase();
    if(!address){throw new Error('No account selected');}
    setStatus('Requesting sign-in message\u2026');
    const nRes=await fetch('/api/auth/nonce?address='+address);
    const nData=await nRes.json();
    if(!nRes.ok){throw new Error(nData.error||'Could not start sign-in');}
    btn.innerHTML='<span class="spin"></span> Check your wallet\u2026';
    setStatus('Sign the message in your wallet to continue\u2026');
    const signature=await window.ethereum.request({method:'personal_sign',params:[nData.message,address]});
    btn.innerHTML='<span class="spin"></span> Verifying holdings\u2026';
    setStatus('Checking your $ROBINSCAN balance\u2026');
    const vRes=await fetch('/api/auth/verify',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({address,signature})});
    const vData=await vRes.json();
    if(vRes.status===403&&vData.error==='insufficient_holdings'){renderShort(vData,address);return;}
    if(!vRes.ok){throw new Error((vData.error||'verification_failed')+(vData.detail?': '+vData.detail:''));}
    localStorage.setItem(SESSION_KEY,JSON.stringify({token:vData.token,address,ts:Date.now()}));
    renderMember(address);
  }catch(e){
    const m=(e&&e.message)||String(e);
    if(/reject|denied|user denied/i.test(m)){setStatus('Sign-in cancelled. Nothing was sent.',false);}
    else{setStatus(m,true);}
    btn.disabled=false;btn.textContent='Connect wallet';
  }
}

function renderShort(data,address){
  view.innerHTML=
    '<div class="gate">'
    +'<h1 class="gate-h">Almost there</h1>'
    +'<p class="gate-p">Your wallet is connected, but it doesn\u2019t hold enough $ROBINSCAN yet.</p>'
    +'<div class="short">'
    +'<div class="short-h">You need more $ROBINSCAN</div>'
    +'<div class="short-p">You hold <span class="mono">'+(data.have||0).toLocaleString()+'</span> \u00b7 '
    +'entry requires <span class="mono">'+(data.need||100000).toLocaleString()+'</span>. '
    +'You\u2019re <span class="mono">'+(data.short||0).toLocaleString()+'</span> short.</div>'
    +'<a class="btn" href="'+BUY_URL+'" target="_blank" rel="noopener">Get $ROBINSCAN</a>'
    +'</div>'
    +'<button class="btn btn-ghost" id="retryBtn" style="margin-top:10px">Check again</button>'
    +'</div>';
  $('retryBtn').addEventListener('click',connectAndVerify);
}

function renderMember(address){
  view.innerHTML=
    '<div class="member">'
    +'<span class="member-check">'+ICON_CHECK+'</span>'
    +'<div class="member-h">You\u2019re in</div>'
    +'<div class="member-addr">'+short(address)+'</div>'
    +'<div class="member-p">Verified $ROBINSCAN holder. Your session lasts 6 hours.<br>The explorer is coming online here \u2014 this is the members home.</div>'
    +'<div class="member-actions">'
    +'<button class="btn" id="exploreBtn" disabled>Open explorer (soon)</button>'
    +'<button class="btn btn-ghost" id="signOutBtn">Sign out</button>'
    +'</div>'
    +'</div>';
  $('signOutBtn').addEventListener('click',function(){localStorage.removeItem(SESSION_KEY);boot();});
}

async function boot(){
  const raw=localStorage.getItem(SESSION_KEY);
  if(raw){
    try{
      const s=JSON.parse(raw);
      const r=await fetch('/api/x/me',{headers:{authorization:'Bearer '+s.token}});
      if(r.ok){const d=await r.json();renderMember(d.address);return;}
      localStorage.removeItem(SESSION_KEY);
    }catch(e){localStorage.removeItem(SESSION_KEY);}
  }
  renderGate();
}
boot();
</script>
</body>
